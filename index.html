<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNEC · Ehtimal Nəzəriyyəsi</title>
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(','\\)'],['$','$']], displayMath: [['$$','$$']] },
  options: { skipHtmlTags: ['script','noscript','style','textarea'] }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070b14;
  --surface: #0f1624;
  --card: #141d2e;
  --border: #1e2d47;
  --gold: #c9a227;
  --gold2: #e8c252;
  --text: #e8edf5;
  --muted: #6b7a94;
  --correct: #1a7a4a;
  --correct-bg: #0d3d24;
  --correct-border: #22c55e;
  --wrong: #7a1a1a;
  --wrong-bg: #3d0d0d;
  --wrong-border: #ef4444;
  --accent: #2563eb;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  line-height: 1.65;
  min-height: 100vh;
}

/* ── SPLASH ── */
#splash {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,162,39,.18) 0%, transparent 70%),
    var(--bg);
}
.splash-inner {
  max-width: 600px;
  width: 100%;
  text-align: center;
}
.logo-badge {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  background: rgba(201,162,39,.12);
  border: 1px solid rgba(201,162,39,.3);
  border-radius: 999px;
  padding: .35rem 1rem;
  font-size: .78rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--gold2);
  margin-bottom: 2rem;
}
.logo-badge svg { width: 14px; height: 14px; }
h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 6vw, 3.2rem);
  line-height: 1.15;
  color: #fff;
  margin-bottom: 1rem;
}
h1 span { color: var(--gold); font-style: italic; }
.subtitle {
  color: var(--muted);
  font-size: .95rem;
  margin-bottom: 2.5rem;
}
.stats-row {
  display: flex;
  justify-content: center;
  gap: 1.5rem;
  margin-bottom: 2.5rem;
  flex-wrap: wrap;
}
.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: .8rem 1.4rem;
  text-align: center;
  min-width: 110px;
}
.stat-num {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--gold);
  font-family: 'Playfair Display', serif;
}
.stat-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: .1rem; }
.btn-start {
  display: inline-flex;
  align-items: center;
  gap: .6rem;
  background: var(--gold);
  color: #07090f;
  font-weight: 700;
  font-size: 1rem;
  padding: .9rem 2.4rem;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .02em;
}
.btn-start:hover { background: var(--gold2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,162,39,.35); }
.btn-start svg { width: 18px; height: 18px; }

/* ── QUIZ ── */
#quiz { display: none; min-height: 100vh; padding: 0; }

.quiz-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(7,11,20,.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: .75rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.header-brand {
  font-family: 'Playfair Display', serif;
  font-size: .95rem;
  color: var(--gold);
  white-space: nowrap;
}
.progress-wrap { flex: 1; max-width: 320px; }
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: .72rem;
  color: var(--muted);
  margin-bottom: .35rem;
}
.progress-bar {
  height: 5px;
  background: var(--border);
  border-radius: 999px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  border-radius: 999px;
  transition: width .4s ease;
  width: 0%;
}
.timer-box {
  display: flex;
  align-items: center;
  gap: .4rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: .4rem .9rem;
  font-size: .9rem;
  font-weight: 600;
  min-width: 80px;
  justify-content: center;
}
.timer-box.warning { border-color: var(--gold); color: var(--gold); }
.timer-box.danger { border-color: var(--wrong-border); color: var(--wrong-border); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* Question area */
.quiz-body { max-width: 820px; margin: 0 auto; padding: 2.5rem 1.5rem; }

.q-num {
  font-size: .78rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: .6rem;
}
.q-text {
  font-size: 1.05rem;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 2rem;
  padding: 1.5rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
}
.options { display: flex; flex-direction: column; gap: .65rem; }
.option-btn {
  width: 100%;
  text-align: left;
  padding: 1rem 1.3rem;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  color: var(--text);
  font-size: .95rem;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: .9rem;
  transition: all .18s;
  position: relative;
  line-height: 1.55;
}
.option-btn:hover:not(:disabled) {
  border-color: var(--gold);
  background: rgba(201,162,39,.06);
}
.opt-letter {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: 6px;
  background: var(--border);
  color: var(--muted);
  font-size: .78rem;
  font-weight: 600;
  flex-shrink: 0;
  margin-top: .05rem;
  transition: all .18s;
}
.option-btn:hover:not(:disabled) .opt-letter {
  background: var(--gold);
  color: #07090f;
}
.option-btn.correct {
  background: var(--correct-bg);
  border-color: var(--correct-border);
}
.option-btn.correct .opt-letter { background: var(--correct-border); color: #fff; }
.option-btn.wrong {
  background: var(--wrong-bg);
  border-color: var(--wrong-border);
}
.option-btn.wrong .opt-letter { background: var(--wrong-border); color: #fff; }
.option-btn.show-correct {
  background: var(--correct-bg);
  border-color: var(--correct-border);
  opacity: .7;
}
.option-btn:disabled { cursor: default; }

.feedback-icon {
  margin-left: auto;
  flex-shrink: 0;
  font-size: 1.1rem;
  padding-left: .5rem;
}

/* nav */
.q-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 2.5rem;
}
.btn-nav {
  display: flex;
  align-items: center;
  gap: .4rem;
  padding: .65rem 1.4rem;
  border-radius: 9px;
  font-size: .9rem;
  font-weight: 500;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: all .18s;
}
.btn-nav:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
.btn-nav:disabled { opacity: .3; cursor: default; }
.btn-finish {
  background: var(--gold);
  border-color: var(--gold);
  color: #07090f;
  font-weight: 700;
}
.btn-finish:hover:not(:disabled) { background: var(--gold2); border-color: var(--gold2); color: #07090f; }

/* dot map */
.dot-map {
  display: flex;
  flex-wrap: wrap;
  gap: .35rem;
  margin-top: 1.5rem;
  padding: 1rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.dot {
  width: 22px;
  height: 22px;
  border-radius: 5px;
  background: var(--border);
  cursor: pointer;
  transition: all .18s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .65rem;
  color: var(--muted);
}
.dot:hover { background: var(--gold); color: #07090f; }
.dot.active { background: var(--gold); color: #07090f; font-weight: 700; }
.dot.answered-c { background: var(--correct-bg); border: 1px solid var(--correct-border); color: var(--correct-border); }
.dot.answered-w { background: var(--wrong-bg); border: 1px solid var(--wrong-border); color: var(--wrong-border); }

/* ── RESULTS ── */
#results { display: none; min-height: 100vh; padding: 2rem 1.5rem; }
.results-inner { max-width: 820px; margin: 0 auto; }
.score-hero {
  text-align: center;
  padding: 3rem 2rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  margin-bottom: 2.5rem;
  position: relative;
  overflow: hidden;
}
.score-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(201,162,39,.1) 0%, transparent 70%);
}
.score-ring {
  width: 130px;
  height: 130px;
  margin: 0 auto 1.5rem;
  position: relative;
}
.score-ring svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
.ring-fg { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1); }
.score-pct {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.score-pct-num {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 700;
  line-height: 1;
}
.score-pct-label { font-size: .7rem; color: var(--muted); margin-top: .2rem; }
.result-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.7rem;
  margin-bottom: .5rem;
}
.result-sub { color: var(--muted); font-size: .9rem; }
.score-stats {
  display: flex;
  justify-content: center;
  gap: 1.5rem;
  margin-top: 1.5rem;
  flex-wrap: wrap;
}
.ss { text-align: center; }
.ss-num { font-size: 1.5rem; font-weight: 700; }
.ss-label { font-size: .72rem; color: var(--muted); }
.btn-retry {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  margin-top: 1.5rem;
  padding: .75rem 2rem;
  background: transparent;
  border: 1.5px solid var(--gold);
  color: var(--gold);
  border-radius: 9px;
  font-size: .9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
}
.btn-retry:hover { background: var(--gold); color: #07090f; }

/* Review */
.review-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  margin-bottom: 1rem;
  color: var(--text);
}
.review-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.2rem 1.4rem;
  margin-bottom: 1rem;
  transition: border-color .2s;
}
.review-item.rc { border-color: var(--correct-border); }
.review-item.rw { border-color: var(--wrong-border); }
.review-header {
  display: flex;
  align-items: flex-start;
  gap: .8rem;
  margin-bottom: .8rem;
}
.review-badge {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .8rem;
  margin-top: .1rem;
}
.rc .review-badge { background: var(--correct-border); color: #fff; }
.rw .review-badge { background: var(--wrong-border); color: #fff; }
.review-q { font-size: .92rem; line-height: 1.6; }
.review-answers { display: flex; flex-direction: column; gap: .4rem; margin-top: .6rem; }
.rev-opt {
  font-size: .85rem;
  padding: .4rem .8rem;
  border-radius: 7px;
  display: flex;
  align-items: flex-start;
  gap: .5rem;
}
.rev-opt.rc { background: var(--correct-bg); color: #4ade80; }
.rev-opt.rw { background: var(--wrong-bg); color: #f87171; }
.rev-opt.neutral { color: var(--muted); }
.rev-opt .lbl { flex-shrink: 0; font-size: .75rem; font-weight: 600; width: 18px; }


.tbl { border-collapse: collapse; margin: .5rem 0; font-size: .88rem; }
.tbl th, .tbl td { border: 1px solid var(--gold); padding: .3rem .7rem; text-align: center; }
.tbl th { background: rgba(201,162,39,.15); color: var(--gold2); }

/* Animations */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.fade-up { animation: fadeUp .35s ease both; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.fade-in { animation: fadeIn .5s ease both; }

/* mobile */
@media(max-width:600px){
  .quiz-header { flex-wrap: wrap; gap: .5rem; }
  .progress-wrap { order: 3; max-width: 100%; width: 100%; }
  .quiz-body { padding: 1.5rem 1rem; }
  h1 { font-size: 1.8rem; }
}
</style>
</head>
<body>

<!-- ════════════════ SPLASH ════════════════ -->
<div id="splash">
  <div class="splash-inner fade-up">
    <div class="logo-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
      UNEC · Tədris Platforması
    </div>
    <h1>Ehtimal <span>Nəzəriyyəsi</span> Testi</h1>
    <p class="subtitle">Hər girişdə 333 sualdan <strong style="color:var(--text)">30 sual</strong> təsadüfi seçilir.<br>Cavabı seçdiyiniz anda dərhal yoxlanılır.</p>
    <div class="stats-row">
      <div class="stat"><div class="stat-num">30</div><div class="stat-label">Sual</div></div>
      <div class="stat"><div class="stat-num">30</div><div class="stat-label">Dəqiqə</div></div>
      <div class="stat"><div class="stat-num">333</div><div class="stat-label">Sual Bazası</div></div>
    </div>
    <button class="btn-start" onclick="startQuiz()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Testi Başlat
    </button>
  </div>
</div>

<!-- ════════════════ QUIZ ════════════════ -->
<div id="quiz">
  <header class="quiz-header">
    <div class="header-brand">UNEC · Ehtimal</div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="q-counter">Sual 1 / 30</span>
        <span id="answered-count">0 cavablandı</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="timer-box" id="timer-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="timer-display">30:00</span>
    </div>
  </header>

  <div class="quiz-body">
    <div id="q-num" class="q-num"></div>
    <div id="q-text" class="q-text fade-up"></div>
    <div id="options" class="options fade-up"></div>

    <div class="dot-map" id="dot-map"></div>

    <div class="q-nav">
      <button class="btn-nav" id="btn-prev" onclick="navigate(-1)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Əvvəlki
      </button>
      <button class="btn-nav btn-finish" id="btn-finish" onclick="finishQuiz()">
        Bitir &amp; Nəticə
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <button class="btn-nav" id="btn-next" onclick="navigate(1)">
        Növbəti
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ════════════════ RESULTS ════════════════ -->
<div id="results">
  <div class="results-inner">
    <div class="score-hero fade-in">
      <div class="score-ring">
        <svg viewBox="0 0 120 120" width="130" height="130">
          <circle class="ring-bg" cx="60" cy="60" r="50"/>
          <circle class="ring-fg" id="ring-fg" cx="60" cy="60" r="50"/>
        </svg>
        <div class="score-pct">
          <div class="score-pct-num" id="pct-num">0%</div>
          <div class="score-pct-label">Nəticə</div>
        </div>
      </div>
      <div class="result-title" id="result-title"></div>
      <div class="result-sub" id="result-sub"></div>
      <div class="score-stats">
        <div class="ss"><div class="ss-num" style="color:var(--correct-border)" id="r-correct">0</div><div class="ss-label">Düzgün</div></div>
        <div class="ss"><div class="ss-num" style="color:var(--wrong-border)" id="r-wrong">0</div><div class="ss-label">Səhv</div></div>
        <div class="ss"><div class="ss-num" style="color:var(--muted)" id="r-skip">0</div><div class="ss-label">Cavabsız</div></div>
      </div>
     <button class="btn-retry" onclick="location.reload()">Yeni Test Başlat</button>
    </div>
    <div class="review-title">📋 Sualların İcmalı</div>
    <div id="review-list"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  QUESTION BANK
// ══════════════════════════════════════════
const BANK = [
{id:85,q:"Mağazaya gətirilən 30 televizordan beşində gizli qüsur var. Alınan 2 televizorun qüsursuz olması hadisəsinin ehtimalını tapın (cavabı 58p kimi qeyd edin).",o:["40","30","20","24","Düzgün cavab yoxdur"],c:0},
{id:86,q:"Sorğuya 6 kişi və 4 qadından ibarət qrup cəlb olunmuşdu. Sorğu aparılan 3 nəfərin hamısının qadın olması hadisəsinin ehtimalını tapın.",o:["1/2","Düzgün cavab yoxdur","11/30","3/4","1/30"],c:4},
{id:87,q:"Elektrik stansiyasında 4-ü qadın olmaqla 12 mühəndis işləyir. Hər gün növbəyə 3 işçi çıxır. Onların üçünün də kişi olması hadisəsinin ehtimalını tapın.",o:["14/55","Düzgün cavab yoxdur","8/55","1/12","1/55"],c:0},
{id:88,q:"Aşağıdakı təkliflərdən hansılar doğrudur?<br>I) A hadisəsinin ehtimalı, həmin hadisə üçün əlverişli elementar hadisələrin sayının bütün eyniimkanlı elementar hadisələrin sayına olan <em>nisbətinə</em> deyilir.<br>II) A hadisəsinin ehtimalı ... sayına olan <em>hasilinə</em> deyilir.<br>III) İki birgəolmayan A və B hadisələrinin cəminin ehtimalı: \\(P(A+B)=P(A)+P(B)\\)<br>IV) İki birgə olan A və B hadisələrinin cəminin ehtimalı: \\(P(A+B)=P(A)+P(B)\\)",o:["I və IV","Düzgün cavab yoxdur","I və III","III və IV","Yalnız I"],c:2},
{id:91,q:"Sexdə 6 mühərrik var. Hər bir anda mühərrikin qoşulması ehtimalı 0,8-ə bərabərdir. Bütün mühərriklərin qoşulmaması ehtimalını tapın.",o:["0,000064","0,064","0,0062","0,062","0,0064"],c:0},
{id:92,q:"n sayda Bernulli sınaqlarında \\(n=10\\) və \\(p=0{,}9\\) olduqda ən böyük ehtimallı ədədi tapın.",o:["7","5 və 4","6 və 7","9","8"],c:3},

let questions = [], current = 0, answers = [], timerSec = 30*60, timerInterval, advanceTimer = null;
const LETTERS = ['A','B','C','D','E'];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startQuiz(){
  if(advanceTimer){ clearTimeout(advanceTimer); advanceTimer = null; }
  // Pick 30 random questions and shuffle their options
  questions = shuffle(BANK).slice(0, 30).map(q => {
    // Create shuffled option indices
    const idxs = shuffle([0,1,2,3,4].slice(0, q.o.length));
    const shuffledOpts = idxs.map(i => q.o[i]);
    const newC = idxs.indexOf(q.c); // new position of correct answer
    return { ...q, o: shuffledOpts, c: newC, _orig: q };
  });
  answers = new Array(30).fill(null);
  current = 0;
  timerSec = 30*60;
  document.getElementById('splash').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQ();
  buildDots();
  startTimer();
}

function renderQ(){
  const q = questions[current];
  document.getElementById('q-num').textContent = `Sual ${current+1} / 30`;
  document.getElementById('q-counter').textContent = `Sual ${current+1} / 30`;

  const answered = answers.filter(a=>a!==null).length;
  document.getElementById('answered-count').textContent = `${answered} cavablandı`;
  document.getElementById('progress-fill').style.width = `${((current+1)/30)*100}%`;

  // question text
  const qEl = document.getElementById('q-text');
  qEl.innerHTML = q.q;
  qEl.className = 'q-text fade-up';
  void qEl.offsetWidth; // reflow

  // options
  const optsEl = document.getElementById('options');
  optsEl.innerHTML = '';
  optsEl.className = 'options fade-up';
  void optsEl.offsetWidth;

  q.o.forEach((opt, i)=>{
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.id = `opt-${i}`;
    btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span class="opt-text">${opt}</span><span class="feedback-icon"></span>`;

    const userAns = answers[current];
    if(userAns !== null){
      btn.disabled = true;
      if(i === q.c){
        btn.classList.add('correct');
        btn.querySelector('.feedback-icon').textContent = '✓';
      } else if(i === userAns){
        btn.classList.add('wrong');
        btn.querySelector('.feedback-icon').textContent = '✗';
      } else {
        btn.style.opacity = '.45';
      }
    } else {
      btn.onclick = ()=> selectAnswer(i);
    }
    optsEl.appendChild(btn);
  });

  document.getElementById('btn-prev').disabled = (current === 0);
  document.getElementById('btn-next').disabled = (current === 29);

  updateDots();

  // MathJax
  if(window.MathJax && MathJax.typesetPromise){
    MathJax.typesetPromise([qEl, optsEl]).catch(()=>{});
  }
}

function selectAnswer(idx){
  if(answers[current] !== null) return;
  answers[current] = idx;
  const q = questions[current];

  // disable all
  document.querySelectorAll('.option-btn').forEach((btn, i)=>{
    btn.disabled = true;
    if(i === q.c){
      btn.classList.add('correct');
      btn.querySelector('.feedback-icon').textContent = '✓';
    } else if(i === idx && idx !== q.c){
      btn.classList.add('wrong');
      btn.querySelector('.feedback-icon').textContent = '✗';
    } else {
      btn.style.opacity = '.45';
    }
  });

  updateDots();
  const answered = answers.filter(a=>a!==null).length;
  document.getElementById('answered-count').textContent = `${answered} cavablandı`;

  // auto-advance after 0.8s
  if(current < 29){
    advanceTimer = setTimeout(()=>{ advanceTimer = null; navigate(1); }, 800);
  }
}

function navigate(dir){
  if(advanceTimer){ clearTimeout(advanceTimer); advanceTimer = null; }
  current += dir;
  current = Math.max(0, Math.min(29, current));
  renderQ();
}

function buildDots(){
  const map = document.getElementById('dot-map');
  map.innerHTML = '';
  for(let i=0;i<30;i++){
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = `dot-${i}`;
    d.textContent = i+1;
    d.onclick = ()=>{ if(advanceTimer){ clearTimeout(advanceTimer); advanceTimer = null; } current=i; renderQ(); };
    map.appendChild(d);
  }
}

function updateDots(){
  for(let i=0;i<30;i++){
    const d = document.getElementById(`dot-${i}`);
    if(!d) continue;
    d.className = 'dot';
    if(i===current) d.classList.add('active');
    if(answers[i]!==null){
      d.classList.add(answers[i]===questions[i].c ? 'answered-c' : 'answered-w');
    }
  }
}

// Timer
function startTimer(){
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    timerSec--;
    const m=Math.floor(timerSec/60), s=timerSec%60;
    document.getElementById('timer-display').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const box = document.getElementById('timer-box');
    box.className = 'timer-box';
    if(timerSec<=300) box.classList.add('warning');
    if(timerSec<=60) box.classList.add('danger');
    if(timerSec<=0){ clearInterval(timerInterval); finishQuiz(); }
  }, 1000);
}

function finishQuiz(){
  clearInterval(timerInterval);
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  showResults();
}

function showResults(){
  let correct=0, wrong=0, skip=0;
  questions.forEach((q,i)=>{
    if(answers[i]===null) skip++;
    else if(answers[i]===q.c) correct++;
    else wrong++;
  });
  const pct = Math.round((correct/30)*100);

  // ring
  const r=50, circ=2*Math.PI*r;
  const ring = document.getElementById('ring-fg');
  ring.setAttribute('stroke-dasharray', circ);
  ring.setAttribute('stroke-dashoffset', circ);
  const color = pct>=70 ? '#22c55e' : pct>=40 ? '#c9a227' : '#ef4444';
  ring.style.stroke = color;
  setTimeout(()=>{ ring.style.strokeDashoffset = circ - (pct/100)*circ; },100);

  document.getElementById('pct-num').textContent = pct+'%';
  document.getElementById('pct-num').style.color = color;
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-skip').textContent = skip;

  const titles = ['Əla! 🎉','Yaxşı! 👍','Orta 📚','Daha çox çalış! 💪'];
  const subs = [`${correct}/30 düzgün cavab — Mükəmməl nəticə!`,`${correct}/30 düzgün cavab — Davam et!`,`${correct}/30 düzgün cavab — Mövzuları təkrar et.`,`${correct}/30 düzgün cavab — Daha çox məşq lazımdır.`];
  const ti = pct>=85?0:pct>=65?1:pct>=40?2:3;
  document.getElementById('result-title').textContent = titles[ti];
  document.getElementById('result-sub').textContent = subs[ti];

  // Review
  const list = document.getElementById('review-list');
  list.innerHTML = '';
  questions.forEach((q,i)=>{
    const isC = answers[i]===q.c;
    const isSkip = answers[i]===null;
    const div = document.createElement('div');
    div.className = `review-item ${isSkip?'':isC?'rc':'rw'}`;
    const icon = isSkip?'—':isC?'✓':'✗';
    let optsHtml = '';
    q.o.forEach((opt,j)=>{
      let cls='neutral';
      if(j===q.c) cls='rc';
      else if(j===answers[i] && answers[i]!==null && j!==q.c) cls='rw';
      optsHtml+=`<div class="rev-opt ${cls}"><span class="lbl">${LETTERS[j]}</span><span>${opt}</span></div>`;
    });
    div.innerHTML = `
      <div class="review-header">
        <div class="review-badge">${icon}</div>
        <div class="review-q"><strong>S${q.id}:</strong> ${q.q}</div>
      </div>
      <div class="review-answers">${optsHtml}</div>`;
    list.appendChild(div);
  });

  window.scrollTo(0,0);
  if(window.MathJax && MathJax.typesetPromise){
    MathJax.typesetPromise([list]).catch(()=>{});
  }
}

function retryQuiz(){
  clearInterval(timerInterval);
  if(advanceTimer){ clearTimeout(advanceTimer); advanceTimer = null; }
  document.getElementById('results').style.display = 'none';
  document.getElementById('splash').style.display = 'none';
  questions = shuffle(BANK).slice(0, 30).map(function(q) {
    var idxs = shuffle([0,1,2,3,4].slice(0, q.o.length));
    var shuffledOpts = idxs.map(function(i){ return q.o[i]; });
    var newC = idxs.indexOf(q.c);
    return Object.assign({}, q, { o: shuffledOpts, c: newC });
  });
  answers = new Array(30).fill(null);
  current = 0;
  timerSec = 30*60;
  document.getElementById('quiz').style.display = 'block';
  renderQ();
  buildDots();
  startTimer();
  window.scrollTo(0,0);
}
</script>
</body>
</html>
